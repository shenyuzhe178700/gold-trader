<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d1117">
    <title>黄金短线交易分析 · Gold Trader</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥇</text></svg>">
</head>
<body>
    <!-- 顶部状态栏 -->
    <div class="header">
        <div class="header-title">
            <span class="icon">🥇</span> Gold Trader
        </div>
        <div class="header-status">
            <span class="status-dot"></span>
            <span class="status-text">连接中...</span>
            <span style="margin-left:8px;font-size:11px;color:var(--text-muted);" id="update-time"></span>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="container">
        <!-- 操作按钮 -->
        <div class="action-bar">
            <button class="btn btn-primary" id="btn-refresh">🔄 刷新分析</button>
            <button class="btn btn-outline" id="btn-auto">▶ 自动推送</button>
        </div>

        <!-- 价格卡片 -->
        <div class="price-card gold-theme" id="price-card">
            <div class="loading"><div class="spinner"></div></div>
        </div>

        <!-- 交易信号卡片 -->
        <div class="signal-card neutral" id="signal-card">
            <div class="loading"><div class="spinner"></div></div>
        </div>

        
        <!-- DeepSeek AI 分析面板 -->
        <div class="card" id="ai-panel" style="border-color: rgba(88,166,255,0.3);">
            <div class="card-header">
                <span>🤖 AI量化分析 <span style="font-size:10px;color:var(--text-muted);">DeepSeek</span></span>
                <span style="font-size:11px;color:var(--text-muted);" id="ai-status">未配置</span>
            </div>
            <div id="ai-content">
                <div class="empty-state">
                    <div class="icon">🔑</div>
                    <div>配置DeepSeek API Key以启用AI分析</div>
                    <div style="margin-top:8px;">
                        <input type="password" id="api-key-input" placeholder="输入 DeepSeek API Key" 
                               style="width:80%;max-width:300px;padding:8px;border-radius:6px;border:1px solid var(--border);
                                      background:var(--bg-primary);color:var(--text-primary);font-size:13px;margin-right:6px;">
                        <button class="btn btn-primary" id="btn-config-llm" style="margin-top:6px;">⚡ 启用AI</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 技术指标 -->
<!-- 技术指标 -->
        <div class="card">
            <div class="card-header">
                <span>📊 技术指标面板</span>
            </div>
            <div class="indicators-grid" id="indicators-grid">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- 关联市场 -->
        <div class="card">
            <div class="card-header">
                <span>🌐 关联市场</span>
            </div>
            <div id="markets-list">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- 信号详情 -->
        <div class="card">
            <div class="card-header">
                <span>🔍 多维信号详情</span>
            </div>
            <div id="signals-detail">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- 底部信息 -->
        <div style="text-align:center;padding:20px;font-size:11px;color:var(--text-muted);">
            ⚠️ 本工具仅供分析参考，不构成投资建议<br>
            数据来源: Yahoo Finance · 短线周期: 1小时内
        </div>
    </div>

    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <!-- 仪表盘脚本 -->
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
